name: Deploy to Mini PC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            powershell -Command "$env:DOCKER_BUILDKIT=0; cd C:\Users\onmis\project; git fetch origin main; git reset --hard origin/main; cd gallery; docker-compose up -d --build; cd ../portal; docker-compose up -d --build; git log -1"