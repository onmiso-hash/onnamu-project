<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 로그인 - onnamu Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Portal 메인 디자인 CSS 이식 및 로그인 맞춤화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6;
            background-image: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            /* Soft Glassmorphism 효과 */
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: fadeInDown 0.6s ease-out;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { font-size: 60px; margin-bottom: 20px; display: inline-block; }
        h1 { font-size: 26px; color: #333; margin-bottom: 10px; font-weight: 700; }
        .subtitle { color: #666; margin-bottom: 40px; font-size: 15px; }
        
        /* 알림 스타일 */
        .flash {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            text-align: center;
            border: 1px solid transparent;
        }
        .flash.error { background-color: rgba(255, 235, 238, 0.8); color: #c62828; border-color: rgba(239, 154, 154, 0.5); }
        .flash.success { background-color: rgba(232, 245, 233, 0.8); color: #2e7d32; border-color: rgba(165, 214, 167, 0.5); }
        
        /* 입력 필드 스타일 */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
            margin-left: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            background-color: #fff;
            border-color: #8ec5fc;
            box-shadow: 0 0 0 4px rgba(142, 197, 252, 0.15);
        }
        
        /* 버튼 스타일 */
        .btn-login {
            width: 100%;
            padding: 16px;
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Noto Sans KR', sans-serif;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-home {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 5px 10px;
        }
        .btn-home:hover {
            color: #764ba2;
            transform: translateY(-1px);
        }
        
        .footer { text-align: center; margin-top: 40px; color: #888; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🖼️</div>
        <h1>onnamu Gallery</h1>
        <div class="subtitle">개인 미디어 아카이브 로그인</div>
        
        {% if error %}
        <div class="flash error">{{ error }}</div>
        {% endif %}
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="input-group">
                <label for="username">👤 아이디</label>
                <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required autofocus autocomplete="username">
            </div>
            
            <div class="input-group">
                <label for="password">🔒 비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login">서비스 시작하기</button>
        </form>

        <a href="/" class="btn-home">🏠 메인 페이지로 돌아가기</a>
        
        <div class="footer">🏠 onnamu.kr v3.0</div>
    </div>
</body>
</html>
