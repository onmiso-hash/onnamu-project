<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍿 {{ filename }} - onnamu Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 플레이어는 몰입감을 위해 다크 테마 유지하되 Portal 스타일 이식 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ── 상단 바 (Glassmorphism 적용) ── */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .topbar.hide { transform: translateY(-100%); }
        
        .movie-title {
            font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.9);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;
        }
        
        .back-btn {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255,255,255,0.4); transform: translateX(-3px); }

        /* ── 비디오 컨트롤러 (v2 장점 이식 - 네이티브) ── */
        video {
            max-width: 100%; max-height: 100vh;
            outline: none;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        
        /* 자막 스타일링 (기본) */
        video::cue { background: rgba(0, 0, 0, 0.7); color: white; font-size: 18px; font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="topbar" id="topbar">
            <div class="movie-title">🍿 {{ filename }}</div>
            <a href="{{ url_for('movies') }}" class="back-btn">← 목록으로</a>
        </div>
        
        <video controls autoplay playsinline id="video-player">
            <source src="/media/{{ folder }}/movies/{{ filename }}">
            {% if subtitle %}
            <track kind="subtitles" src="/subtitle/{{ folder }}/{{ subtitle }}" srclang="ko" label="한국어 (자동)" default>
            {% endif %}
            브라우저가 video 태그를 지원하지 않습니다.
        </video>
    </div>
    
    <script>
        // ESC 키로 목록 돌아가기 및 상단바 숨김 로직
        const topbar = document.getElementById('topbar');
        const video = document.getElementById('video-player');
        let hideTimeout;

        function showTopBar() {
            topbar.classList.remove('hide');
            body.style.cursor = 'default';
            clearTimeout(hideTimeout);
            if (!video.paused) { hideTimeout = setTimeout(hideTopBar, 3000); }
        }

        function hideTopBar() {
            if (!video.paused) {
                topbar.classList.add('hide');
                body.style.cursor = 'none';
            }
        }

        const body = document.querySelector('body');
        body.addEventListener('mousemove', showTopBar);
        video.addEventListener('play', showTopBar);
        video.addEventListener('pause', showTopBar);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { window.location.href = '{{ url_for("movies") }}'; }
        });
        
        // 초기 로드 시 3초 후 상단바 숨김
        hideTimeout = setTimeout(hideTopBar, 3000);
    </script>
</body>
</html>
