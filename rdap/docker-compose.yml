services:
  my-rdap:
    build: .
    container_name: my-rdap
    restart: unless-stopped
    ports:
      - "5003:80"
    networks:
      - rdap-network

  bootstrap-server:
    build:
      context: ./bootstrap_server
    container_name: rdap-bootstrap
    restart: unless-stopped
    ports:
      - "5004:8000"
    volumes:
      - ./bootstrap_server/data:/app/data
    networks:
      - rdap-network

networks:
  rdap-network:
    driver: bridge
